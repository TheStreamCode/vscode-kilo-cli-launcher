name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run validation suite on Windows
        if: runner.os == 'Windows'
        run: npm run check

      - name: Run validation suite on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run check
